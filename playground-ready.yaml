kind: playground
name: flux-workshop-ready
base: k3s
title: "Flux Workshop (Pre-configured)"
description: |
  Kubernetes cluster with Gitea, Flux, and the workshop repo pre-configured.
  Ready for Labs 2-7.
cover: __static__/flux-cover.png
categories:
  - kubernetes
  - ci-cd
playground:
  networks:
    - name: local
      subnet: 172.16.0.0/24
  machines:
    - name: dev-machine
      users:
        - name: root
        - name: laborant
          default: true
      drives:
        - source: k3s-dev-machine
          mount: /
          size: 30GiB
      network:
        interfaces:
          - address: 172.16.0.5/24
            network: local
      resources:
        cpuCount: 2
        ramSize: 4GiB
    - name: cplane-01
      users:
        - name: root
        - name: laborant
          default: true
      drives:
        - source: k3s-cplane
          mount: /
          size: 30GiB
      network:
        interfaces:
          - address: 172.16.0.2/24
            network: local
      resources:
        cpuCount: 2
        ramSize: 4GiB
    - name: node-01
      users:
        - name: root
        - name: laborant
          default: true
      drives:
        - source: k3s-node
          mount: /
          size: 30GiB
      network:
        interfaces:
          - address: 172.16.0.3/24
            network: local
      resources:
        cpuCount: 2
        ramSize: 2GiB
    - name: node-02
      users:
        - name: root
        - name: laborant
          default: true
      drives:
        - source: k3s-node
          mount: /
          size: 30GiB
      network:
        interfaces:
          - address: 172.16.0.4/24
            network: local
      resources:
        cpuCount: 2
        ramSize: 4GiB
  tabs:
    - id: terminal
      kind: terminal
      name: Terminal
      machine: dev-machine
    - id: ide
      kind: ide
      name: IDE
      machine: dev-machine
    - id: kexp
      kind: kexp
      name: Explorer
      machine: dev-machine
  initTasks:
    init_flux_cli:
      name: init_flux_cli
      machine: dev-machine
      init: true
      user: root
      run: |
        while ! kubectl get nodes 2>/dev/null | grep -q " Ready"; do sleep 2; done
        FLUX_VERSION=$(curl -sf https://api.github.com/repos/fluxcd/flux2/releases/latest | grep tag_name | cut -d'"' -f4)
        curl -sL "https://github.com/fluxcd/flux2/releases/download/${FLUX_VERSION}/flux_${FLUX_VERSION#v}_linux_amd64.tar.gz" | tar xz -C /usr/local/bin
        echo "Flux CLI installed"
    init_gitea:
      name: init_gitea
      machine: dev-machine
      init: true
      user: root
      needs:
        - init_flux_cli
      run: |
        helm repo add gitea-charts https://dl.gitea.com/charts/
        helm repo update
        helm install gitea gitea-charts/gitea --namespace gitea --create-namespace --set gitea.admin.username=workshop --set gitea.admin.password=workshop --set service.http.type=NodePort --set service.http.nodePort=30080 --set persistence.size=1Gi --set redis-cluster.enabled=false --set postgresql-ha.enabled=false --set postgresql.enabled=true --set postgresql.global.postgresql.auth.password=gitea
        echo "Gitea Helm install started"
    init_gitea_wait:
      name: init_gitea_wait
      machine: dev-machine
      init: true
      user: root
      needs:
        - init_gitea
      run: |
        kubectl wait --for=condition=Ready -n gitea pod -l app.kubernetes.io/name=gitea --timeout=300s
        NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')
        GITEA_URL="http://${NODE_IP}:30080"
        for i in $(seq 1 30); do curl -sf ${GITEA_URL}/api/v1/version >/dev/null 2>&1 && break; sleep 2; done
        curl -sf -X POST ${GITEA_URL}/api/v1/user/repos -H "Content-Type: application/json" -u "workshop:workshop" -d '{"name":"flux-workshop","default_branch":"main","auto_init":true}' > /dev/null
        echo "GITEA_URL=${GITEA_URL}" > /etc/workshop.env
        echo "NODE_IP=${NODE_IP}" >> /etc/workshop.env
        echo "Gitea ready at ${GITEA_URL}"
    init_repo:
      name: init_repo
      machine: dev-machine
      init: true
      user: laborant
      needs:
        - init_gitea_wait
      run: |
        source /etc/workshop.env
        git config --global user.email "workshop@devoxx.gr"
        git config --global user.name "Workshop Participant"
        git config --global credential.helper store
        echo "http://workshop:workshop@${NODE_IP}:30080" > ~/.git-credentials
        mkdir -p ~/workshop && cd ~/workshop
        git clone ${GITEA_URL}/workshop/flux-workshop.git
        cd flux-workshop
        mkdir -p clusters/staging apps/base apps/staging infra/base infra/staging tenants/base tenants/team-a
        git add . && git commit -m "Initial directory structure" --allow-empty && git push
        echo "Repo cloned at ~/workshop/flux-workshop"
    init_flux:
      name: init_flux
      machine: dev-machine
      init: true
      user: root
      needs:
        - init_gitea_wait
      run: |
        flux install --components-extra=image-reflector-controller,image-automation-controller
        kubectl wait --for=condition=Ready -n flux-system pods --all --timeout=180s
        echo "Flux controllers installed"
    init_connect:
      name: init_connect
      machine: dev-machine
      init: true
      user: root
      needs:
        - init_flux
        - init_repo
      run: |
        GITEA_CLUSTER_URL="http://gitea-http.gitea.svc.cluster.local:3000"
        kubectl create secret generic flux-system --namespace=flux-system --from-literal=username=workshop --from-literal=password=workshop
        echo "apiVersion: source.toolkit.fluxcd.io/v1
        kind: GitRepository
        metadata:
          name: flux-system
          namespace: flux-system
        spec:
          interval: 1m
          url: ${GITEA_CLUSTER_URL}/workshop/flux-workshop.git
          ref:
            branch: main
          secretRef:
            name: flux-system" | sed 's/^        //' | kubectl apply -f -
        echo "apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: flux-system
          namespace: flux-system
        spec:
          interval: 5m
          sourceRef:
            kind: GitRepository
            name: flux-system
          path: ./clusters/staging
          prune: true" | sed 's/^        //' | kubectl apply -f -
        flux reconcile source git flux-system
        echo "Flux connected to Gitea"
    init_verify:
      name: init_verify
      machine: dev-machine
      init: true
      user: laborant
      needs:
        - init_connect
      run: |
        source /etc/workshop.env
        echo "========================================="
        echo "  Flux GitOps Workshop - Ready!"
        echo "========================================="
        flux check
        flux get sources git
        echo ""
        echo "  Repo: ~/workshop/flux-workshop"
        echo "  Gitea: ${GITEA_URL}"
        echo "  Login: workshop / workshop"
        echo "========================================="
  accessControl:
    canList:
      - anyone
    canRead:
      - anyone
    canStart:
      - anyone
