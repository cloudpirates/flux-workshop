# Lab 5 Checkpoint: OCI Artifacts + Drift Detection
# Apply this if you fell behind during Lab 5:
#   kubectl apply -f checkpoints/lab5-complete.yaml
#
# NOTE: You still need to push the OCI artifact manually:
#   flux push artifact oci://ttl.sh/flux-workshop-$(whoami):1h \
#     --path=./manifests/apps/staging \
#     --source="local" \
#     --revision="workshop/v1.0.0"
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: workshop-oci
  namespace: flux-system
spec:
  interval: 1m
  url: oci://ttl.sh/flux-workshop-laborant
  ref:
    tag: 1h
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: oci-demo
  namespace: flux-system
spec:
  interval: 2m
  path: .
  prune: true
  force: true
  sourceRef:
    kind: OCIRepository
    name: workshop-oci
  targetNamespace: oci-demo
