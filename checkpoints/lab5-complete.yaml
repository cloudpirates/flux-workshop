# Lab 5 Checkpoint: OCI Artifacts + Drift Detection
# Apply this if you fell behind during Lab 5:
#   kubectl apply -f checkpoints/lab5-complete.yaml
#
# This replicates the state you'd have after committing
# clusters/staging/podinfo-oci.yaml to the lab git repo and
# letting Flux reconcile it.
---
apiVersion: v1
kind: Namespace
metadata:
  name: podinfo-oci
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: podinfo
  namespace: podinfo-oci
spec:
  interval: 1m
  url: oci://ghcr.io/stefanprodan/manifests/podinfo
  ref:
    semver: "6.x"
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: podinfo
  namespace: podinfo-oci
spec:
  interval: 2m
  targetNamespace: podinfo-oci
  prune: true
  sourceRef:
    kind: OCIRepository
    name: podinfo
  path: "./"
